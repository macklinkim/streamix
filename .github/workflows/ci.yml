name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Proto codegen
        run: pnpm proto:gen

      - name: Proto lint
        run: pnpm proto:lint

      - name: Proto breaking-change check
        run: pnpm proto:breaking

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      # Dependency vulnerability gate (inbox/review.md P2-5). High+ blocks the
      # build; moderate advisories are periodic-triage, not a gate.
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  # Session-hardening integration test (inbox/review.md V3-3): boots isolated
  # Postgres/Redis + svc-core + BFF and runs the full auth/session smoke —
  # rotation atomicity, grace idempotency, reuse detection, family revoke,
  # logout race, Connect credential-RPC block.
  session-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: streamix
          POSTGRES_PASSWORD: streamix
          POSTGRES_DB: streamix
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U streamix -d streamix"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # Short grace keeps the smoke's post-grace reuse test fast. Both services
      # and the smoke script read this same variable.
      REFRESH_GRACE_MS: "1000"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Proto codegen
        run: pnpm proto:gen

      - name: Build services
        run: pnpm --filter @streamix/proto --filter @streamix/schemas --filter @streamix/db --filter @streamix/svc-core --filter @streamix/bff build

      - name: Migrate
        run: pnpm --filter @streamix/db db:migrate

      - name: Start svc-core + BFF
        run: |
          node apps/svc-core/dist/main.js > core.log 2>&1 &
          echo $! > core.pid
          # Wait for core's gRPC port before starting the BFF (V6-6): the BFF
          # health check alone doesn't prove core readiness, and a slow runner
          # can race the smoke's first register against core startup. Failing
          # to open the port within 30s is an explicit failure (V7-3).
          core_up=0
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/50051) 2>/dev/null && core_up=1 && break
            sleep 1
          done
          if [ "$core_up" != "1" ]; then
            echo "svc-core did not open :50051" >&2
            exit 1
          fi
          node apps/bff/dist/main.js > bff.log 2>&1 &
          echo $! > bff.pid
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/health && exit 0
            sleep 1
          done
          echo "bff did not become healthy" >&2
          exit 1

      - name: Session smoke
        run: pnpm --filter @streamix/bff smoke:session

      # Low-level rotate/revoke stress + direct famrev assertions (V5-4).
      - name: Session stress
        run: pnpm --filter @streamix/bff smoke:session-stress

      # After the smoke (V7-3): an earlier position would already have run —
      # and been skipped — before a smoke failure could set failure().
      - name: Service logs on failure
        if: failure()
        # Request logs already redact authorization/cookie headers; URLs are
        # dev-local only.
        run: |
          echo "=== core.log ==="; cat core.log || true
          echo "=== bff.log ===";  cat bff.log || true

      - name: Stop services
        if: always()
        run: |
          kill "$(cat core.pid)" 2>/dev/null || true
          kill "$(cat bff.pid)" 2>/dev/null || true
