syntax = "proto3";

package user.v1;

import "common/v1/common.proto";

// AuthService is owned by svc-core (§5.1). BFF exposes these over Connect-Web.

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  common.v1.Timestamp created_at = 4;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

message RegisterResponse {
  User user = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  User user = 3;
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message MeRequest {}

message MeResponse {
  User user = 1;
}

// Internal-only (BFF OAuth callback -> svc-core). Finds a user by provider_id
// or creates a password-less one. Blocked at the BFF edge like other internal RPCs.
message UpsertOauthUserRequest {
  string provider_id = 1; // e.g. "twitch:12345"
  string email = 2;
  string display_name = 3;
}

message UpsertOauthUserResponse {
  User user = 1;
}

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Me(MeRequest) returns (MeResponse);
  rpc UpsertOauthUser(UpsertOauthUserRequest) returns (UpsertOauthUserResponse);
}
