# MediaMTX config for the LL-HLS spike (M3-1) and subsequent M3 work.
# Ingest: RTMP. Packaging: Low-Latency HLS. WebRTC/SRT disabled (unused surface).
logLevel: info

# --- publish authorization (M3-2) ---
# svc-media validates the stream key for every publish; deny closes the publish.
# Reads go through svc-media's signed reverse proxy and the control API is
# internal-only, so both are excluded from auth. In prod point authHTTPAddress at
# http://streamix-svc-media.internal:8091/mtx/auth instead of host.docker.internal.
authMethod: http
authHTTPAddress: http://host.docker.internal:8091/mtx/auth
authHTTPExclude:
  - action: read
  - action: playback
  - action: api
  - action: metrics
  - action: pprof

# --- ingest ---
rtmp: yes
rtmpAddress: :1935

# --- packaging: Low-Latency HLS ---
hls: yes
hlsAddress: :8888
hlsAllowOrigins: ["*"]
hlsVariant: lowLatency
hlsAlwaysRemux: no
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
# Serve the low-latency parts directly (no directory index needed for the spike).

# --- unused protocols off ---
rtsp: no
webrtc: no
srt: no

# --- control API (M3-2 hooks target this later) ---
api: yes
apiAddress: :9997

paths:
  all_others:
