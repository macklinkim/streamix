name: streamix

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamix
      POSTGRES_PASSWORD: streamix
      POSTGRES_DB: streamix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamix -d streamix"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test:
        ["CMD-SHELL", "mc ready local || curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - miniodata:/data

  # LL-HLS packager (ADR-10). RTMP ingest -> Low-Latency HLS. Ports are distinct
  # from the rest of the stack (1935 RTMP / 8888 HLS / 9997 control API).
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1936:1935" # RTMP ingest (host 1936: dev svc-media/NMS holds 1935)
      - "8888:8888" # LL-HLS
      - "9997:9997" # control API (runOnReady/runOnNotReady hooks land in M3-2)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      - minio

volumes:
  pgdata:
  miniodata:
