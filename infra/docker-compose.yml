name: streamix

services:
  # Images pinned by digest for reproducible dev environments (inbox/review.md
  # V8-4); bump via a reviewed change after checking the changelog.
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_USER: streamix
      POSTGRES_PASSWORD: streamix
      POSTGRES_DB: streamix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamix -d streamix"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test:
        ["CMD-SHELL", "mc ready local || curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - miniodata:/data

  # LL-HLS packager (ADR-10). RTMP ingest -> Low-Latency HLS. Ports are distinct
  # from the rest of the stack (1935 RTMP / 8888 HLS / 9997 control API).
  mediamtx:
    image: bluenviron/mediamtx:latest@sha256:f37aaaf1a707c42b0aff49a3ab5d4fa57a3504ebc3f27657434a820e3b16d730
    ports:
      # MediaMTX now owns RTMP (it replaced svc-media's NMS listener, M3-4), so it
      # binds the port svc-media's RTMP_PORT defaults to. Stop any old NMS-based
      # svc-media (host :1935) before `up`, or override RTMP_PORT for a spike.
      - "1935:1935" # RTMP ingest (OBS + browser-ingest via ingest.ts)
      - "8888:8888" # LL-HLS (fetched by svc-media's signed proxy)
      - "9997:9997" # control API (publish start/stop polling, M3-2)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      - minio

volumes:
  pgdata:
  miniodata:
