events {}

http {
  server {
    listen 80;
    server_name _;

    # Liveness for docker healthcheck / Phase 0 smoke.
    location /healthz {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location / {
      add_header Content-Type text/plain;
      return 200 "streamix nginx up\n";
    }
  }
}
