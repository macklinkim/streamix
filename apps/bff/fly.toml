# Deploy from repo root: fly deploy --config apps/bff/fly.toml --dockerfile apps/bff/Dockerfile
app = "streamix-bff"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"
  CORE_URL = "http://streamix-svc-core.internal:50051"
  CHAT_URL = "http://streamix-svc-chat.internal:50052"

[http_service]
  internal_port = 8080
  force_https = true
  # Cost-minimal: suspend when idle, auto-resume on request (fast).
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
