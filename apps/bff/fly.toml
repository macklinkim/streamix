# Deploy from repo root: fly deploy --config apps/bff/fly.toml --dockerfile apps/bff/Dockerfile
app = "streamix-bff"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  # BFF is the control-plane entry + WS terminator → keep warm (ADR-8, no cold starts).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
